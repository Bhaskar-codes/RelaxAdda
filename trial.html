<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RelaxAdda Carousel</title>

<style>

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    background: #1B2F33;

    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    overflow: hidden;
}

/* MAIN CONTAINER */

.images{
    width: 100%;
    overflow: hidden;
}

/* SLIDER */

.gallery{
    display: flex;
    align-items: center;
    gap: 20px;

    width: max-content;

    animation: slide 12s linear infinite;
}

/* IMAGE CARDS */

.item{
    flex: 0 0 220px;
    height: 320px;

    border-radius: 20px;

    overflow: hidden;

    transition: 0.5s ease;

    opacity: 0.4;

    transform: scale(0.7);

    filter: blur(3px);
}

/* CENTER IMAGE */

.item:nth-child(3){
    transform: scale(1.15);

    opacity: 1;

    filter: blur(0);

    z-index: 10;

    box-shadow: 0 0 40px rgba(201,123,54,0.5);
}

/* IMAGES */

.item img{
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* SLIDER ANIMATION */

@keyframes slide{

    from{
        transform: translateX(0);
    }

    to{
        transform: translateX(-50%);
    }
}

</style>
</head>

<body>

<div class="images">

    <div class="gallery">

        <div class="item">
            <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
        </div>

        <div class="item">
            <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085">
        </div>

        <div class="item">
            <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348">
        </div>

        <div class="item">
            <img src="https://images.unsplash.com/photo-1517701604599-bb29b565090c">
        </div>

        <div class="item">
            <img src="https://images.unsplash.com/photo-1521017432531-fbd92d768814">
        </div>

        <div class="item">
            <img src="https://images.unsplash.com/photo-1498804103079-a6351b050096">
        </div>

    </div>

</div>

</body>
</html>
